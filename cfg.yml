model:
  vocab_size: 261  # bytes (0-255) + 5 special ones (but I will only use bytes + PAD)
  hidden_size: 768
  intermediate_size: 1152
  num_hidden_layers: 22
  num_attention_heads: 12
  hidden_activation: gelu
  pad_token_id: 256  # ONLY THIS ONE WILL BE USED
  eos_token_id: 257
  bos_token_id: 258
  cls_token_id: 259
  sep_token_id: 260
  local_attention: 128
  max_position_embeddings: 512  # it is also the size of all our data records (tokenizer handles this)

dataset:
  name: IIC/ClinText-SP
  split: train
  version: dedup
  dev: false

tokenizer:
  type: baseline  # choose between baseline (one byte, one token), fixed chunk (chunks into a fixed size of bytes and creates a vector), or learned chunking
  chunk_size: null
  batch_size: 16

loss:
  num_global_views: 2
  num_local_views: 4
  num_points: 17
  num_slices: 64
  ld: 0.1

aug:
  global_margin_min: 70
  global_margin_max: 100
  local_margin_min: 10
  local_margin_max: 35

exp:
  device: cuda
  lr: 1e-4
  optim: adamw
  beta0: 0.9
  beta1: 0.95
  eps: 1e-8
  wd: 0.01
  epochs: 10
  log_every_n_step: 10
  save_every_n_step: 500
  use_bf16: true

  